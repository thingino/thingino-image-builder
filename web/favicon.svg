<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Chip body -->
  <rect x="7" y="7" width="18" height="18" rx="2.5" fill="none" stroke="#FF8C00" stroke-width="2"/>
  <!-- Pins top -->
  <line x1="12" y1="7" x2="12" y2="3" stroke="#FF8C00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="7" x2="16" y2="3" stroke="#FF8C00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="7" x2="20" y2="3" stroke="#FF8C00" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pins bottom -->
  <line x1="12" y1="25" x2="12" y2="29" stroke="#FF8C00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="25" x2="16" y2="29" stroke="#FF8C00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="25" x2="20" y2="29" stroke="#FF8C00" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pins left -->
  <line x1="7" y1="12" x2="3" y2="12" stroke="#FF8C00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="7" y1="16" x2="3" y2="16" stroke="#FF8C00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="7" y1="20" x2="3" y2="20" stroke="#FF8C00" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pins right -->
  <line x1="25" y1="12" x2="29" y2="12" stroke="#FF8C00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25" y1="16" x2="29" y2="16" stroke="#FF8C00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25" y1="20" x2="29" y2="20" stroke="#FF8C00" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Inner die -->
  <rect x="10.5" y="10.5" width="11" height="11" rx="1.5" fill="#FF8C00" opacity="0.2"/>
</svg>
