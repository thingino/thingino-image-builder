# Thingino Image Builder — CI build worker.
#
# Triggered by the broker via repository_dispatch:
#   event_type: web-build
#   client_payload: { "build_id": "<uuid>", "defconfig": "<board token>" }
#
# Mirrors the proven recipe in themactep/thingino-firmware/.github/workflows/
# firmware-x86_64.yaml (debian:forky container, apt deps, ccache + dl-cache),
# but builds exactly ONE board and publishes <build_id>.bin to a rolling
# pre-release tag for anonymous CDN download.
name: web-build
run-name: "web-build ${{ github.event.client_payload.build_id || github.event.inputs.build_id }} · ${{ github.event.client_payload.defconfig || github.event.inputs.defconfig }}"

on:
  repository_dispatch:
    types: [web-build]
  # Manual trigger for smoke-testing the chain without the broker.
  workflow_dispatch:
    inputs:
      defconfig:
        description: "Board defconfig token (e.g. atom_cam2_t31x_gc2053_atbm6031)"
        required: true
        default: atom_cam2_t31x_gc2053_atbm6031
      build_id:
        description: "Build id (uuid). Blank = auto-generate."
        required: false
      commit:
        description: "thingino commit/ref to build (blank = master)"
        required: false
      ref:
        description: "thingino branch the commit belongs to (master/ciao/stable)"
        required: false
        default: master
      runner_arch:
        description: "Runner architecture"
        type: choice
        options: [arm64, x86_64]
        required: false
        default: arm64

# No GitHub-side concurrency group: the broker is the gate (global cap of 6),
# so dispatched builds run in parallel here.

permissions:
  contents: write   # create the rolling release + upload assets

env:
  THINGINO_REPO: themactep/thingino-firmware
  THINGINO_REF: master                        # build from master HEAD → output/master/...
  DL_CACHE_REPO: themactep/thingino-firmware  # hosts buildroot-dl-cache releases
  ROLLING_TAG: web-builds
  BR2_DL_DIR: ~/dl
  FORCE_UNSAFE_CONFIGURE: 1
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  TERM: linux
  TZ: UTC

jobs:
  build:
    # ARM64 by default, mirroring thingino-firmware's nightly: the hosted ARM runners are
    # faster for these builds, and the firmware repo's rolling per-board ccache release is
    # built on ARM64, so only an ARM64 build can actually hit it (ccache never matches
    # across host arch). x86_64 stays available for manual runs.
    runs-on: ${{ (github.event.inputs.runner_arch == 'x86_64') && 'ubuntu-26.04' || 'ubuntu-26.04-arm' }}
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    container:
      image: debian:forky
    steps:
      - name: Validate + resolve inputs
        id: in
        env:
          # Untrusted input enters as env vars — never interpolated into the script body.
          RAW_DEFCONFIG: ${{ github.event.client_payload.defconfig || github.event.inputs.defconfig }}
          RAW_BUILD_ID: ${{ github.event.client_payload.build_id || github.event.inputs.build_id }}
          RAW_COMMIT: ${{ github.event.client_payload.commit || github.event.inputs.commit }}
          RAW_REF: ${{ github.event.client_payload.ref || github.event.inputs.ref }}
        run: |
          set -euo pipefail
          DEFCONFIG="${RAW_DEFCONFIG:-}"
          BUILD_ID="${RAW_BUILD_ID:-}"
          # defconfig: lowercase letters, digits, underscore only (no path / shell metachars)
          if [[ ! "$DEFCONFIG" =~ ^[a-z0-9_+]+$ ]]; then
            echo "::error::Invalid defconfig token: '$DEFCONFIG'"; exit 1
          fi
          # build_id: uuid shape (hex + dashes); generate if absent
          if [[ -z "$BUILD_ID" ]]; then BUILD_ID="$(cat /proc/sys/kernel/random/uuid)"; fi
          if [[ ! "$BUILD_ID" =~ ^[a-f0-9-]{8,40}$ ]]; then
            echo "::error::Invalid build_id: '$BUILD_ID'"; exit 1
          fi
          # commit: a 7-40 hex sha or 'master' (default)
          COMMIT="${RAW_COMMIT:-}"
          if [[ -z "$COMMIT" ]]; then COMMIT="${THINGINO_REF}"; fi
          if [[ ! "$COMMIT" =~ ^(master|[0-9a-f]{7,40})$ ]]; then
            echo "::error::Invalid commit: '$COMMIT'"; exit 1
          fi
          # ref: the thingino branch this commit belongs to; names the local branch and
          # picks the upstream ccache channel. Anything unexpected falls back to master.
          REF="${RAW_REF:-}"
          if [[ ! "$REF" =~ ^(master|ciao|stable)$ ]]; then REF="master"; fi
          echo "defconfig=$DEFCONFIG" >> "$GITHUB_OUTPUT"
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          {
            echo "## web-build \`$BUILD_ID\`"
            echo "- defconfig: \`$DEFCONFIG\`"
            echo "- commit: \`$COMMIT\` (\`$REF\`)"
            echo "- runner: \`${{ runner.arch }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # Same dependency list as thingino-firmware's nightly (debian:forky ships gh), which
      # builds every board on it daily; our old copy carried a stale external gh apt repo
      # and a pile of packages nothing here uses.
      - name: Install build dependencies
        run: |
          set -eux
          apt-get update
          apt-get install -y --no-install-recommends --no-install-suggests \
            autoconf build-essential bc cmake cpio curl ca-certificates file git gh make gawk jq \
            lzop m4 p7zip-full perl python3 python3-setuptools procps rsync tzdata u-boot-tools \
            unzip wget libncurses-dev swig python3-dev libssl-dev

      - name: Set timezone
        run: ln -sf "/usr/share/zoneinfo/${TZ}" /etc/localtime && echo "${TZ}" > /etc/timezone

      - name: Checkout thingino (pinned)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: ${{ env.THINGINO_REPO }}
          ref: ${{ steps.in.outputs.commit }}
          # Don't pre-fetch submodules: checkout would clone buildroot SHALLOW, and
          # `make update`'s subsequent by-SHA fetch of the pinned buildroot commit
          # then fails ("upload-pack: not our ref"). Left off, `make update` clones
          # buildroot fresh + full itself, exactly like a local build.
          submodules: "false"
          fetch-depth: "1"
          path: thingino

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE/thingino"

      - name: Put thingino on a branch (make update runs 'git pull --rebase')
        run: |
          set -euo pipefail
          cd thingino
          # The broker pins an exact commit, so checkout leaves HEAD detached. But
          # `make update` runs `git pull --rebase --autostash`, which refuses on a
          # detached HEAD ("You are not currently on a branch"). Put HEAD on a local
          # branch (named after the build ref) that tracks itself, so the pull is a
          # clean no-op: we build the pinned commit exactly (no drift to branch-
          # latest), thingino's version string + output dir show the real branch,
          # and make update's submodule-update + patch steps still run.
          REF="${{ steps.in.outputs.ref }}"
          git checkout -B "$REF"
          git config "branch.${REF}.remote" .
          git config "branch.${REF}.merge" "refs/heads/${REF}"

      - name: Verify defconfig + resolve group
        env:
          DEFCONFIG: ${{ steps.in.outputs.defconfig }}
        run: |
          set -euo pipefail
          if   [ -f "thingino/configs/cameras/${DEFCONFIG}/${DEFCONFIG}_defconfig" ]; then GROUP="";
          elif [ -f "thingino/configs/cameras-exp/${DEFCONFIG}/${DEFCONFIG}_defconfig" ]; then GROUP="exp";
          else echo "::error::Unknown defconfig: ${DEFCONFIG}"; exit 1; fi
          echo "GROUP=$GROUP" >> "$GITHUB_ENV"
          echo "group: ${GROUP:-cameras}"

      - name: Configure cache-key vars
        run: |
          echo "WEEK_NUMBER=$(date +%U)" >> "$GITHUB_ENV"
          echo "CURRENT_YEAR=$(date +%Y)" >> "$GITHUB_ENV"

      - name: Setup cache directories
        run: mkdir -p ~/.buildroot-ccache ~/dl

      # thingino-firmware's nightlies publish a per-board, per-branch ccache to a rolling
      # 'ccache' release (built on ARM64, refreshed daily), mirroring their own restore
      # step. Channel fallback tries the requested branch first, then ciao (their full
      # nightly matrix lives there), then master. Best-effort: a miss just builds colder.
      - name: Restore ccache from thingino-firmware release
        id: upcc
        env:
          DEFCONFIG: ${{ steps.in.outputs.defconfig }}
          REF: ${{ steps.in.outputs.ref }}
          CACHE_ARCH: ${{ runner.arch }}
        run: |
          set -euo pipefail
          CAM_SAFE=$(printf '%s' "$DEFCONFIG" | tr -c 'A-Za-z0-9._-' '-')
          mkdir -p /tmp/cc ~/.buildroot-ccache
          restored=""
          seen=""
          for CH in "$REF" ciao master; do
            case " $seen " in *" $CH "*) continue;; esac
            seen="$seen $CH"
            ASSET="ccache-${CH}-${CACHE_ARCH}-${CAM_SAFE}.zip"
            if gh release download ccache --repo "$DL_CACHE_REPO" --pattern "$ASSET" --dir /tmp/cc 2>/dev/null; then
              echo "Restoring $ASSET ($(du -h "/tmp/cc/$ASSET" | cut -f1))"
              ( cd ~ && 7z x -y "/tmp/cc/$ASSET" >/dev/null ) || echo "  7z rc=$? during restore (non-fatal)"
              restored="$ASSET"
              break
            fi
          done
          if [ -n "$restored" ]; then
            echo "restored=true" >> "$GITHUB_OUTPUT"
            echo "ccache dir now: $(du -sh ~/.buildroot-ccache | cut -f1) in $(find ~/.buildroot-ccache -type f | wc -l) files"
            echo "- ccache: \`$restored\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "restored=false" >> "$GITHUB_OUTPUT"
            echo "No upstream ccache asset for ${CAM_SAFE}, falling back to the repo cache"
          fi
          exit 0

      # Repo-local fallback for boards the upstream release doesn't cover (exp boards,
      # brand-new defconfigs): only restored AND only saved when upstream missed, so the
      # 10GB actions/cache quota isn't spent duplicating what the release already has.
      - name: Restore ccache (repo cache fallback)
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        if: steps.upcc.outputs.restored != 'true'
        with:
          path: ~/.buildroot-ccache
          key: ${{ runner.arch }}-ccache-${{ steps.in.outputs.defconfig }}-${{ env.CURRENT_YEAR }}-week-${{ env.WEEK_NUMBER }}
          restore-keys: |
            ${{ runner.arch }}-ccache-${{ steps.in.outputs.defconfig }}-${{ env.CURRENT_YEAR }}-
            ${{ runner.arch }}-ccache-${{ steps.in.outputs.defconfig }}-

      - name: Find buildroot-dl-cache release
        id: find_release
        run: |
          set -euo pipefail
          RELEASE_TAG=$(gh release list --repo "$DL_CACHE_REPO" --json name,tagName \
            | jq -r '.[] | select(.name=="buildroot-dl-cache") | .tagName' | sort -r | head -1 || echo "")
          if [ -z "$RELEASE_TAG" ]; then
            RELEASE_TAG=$(gh release list --repo "$DL_CACHE_REPO" --json tagName \
              | jq -r '.[] | select(.tagName | startswith("update_cache")) | .tagName' | head -n1 || echo "")
          fi
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          if [ -n "$RELEASE_TAG" ]; then echo "found=true" >> "$GITHUB_OUTPUT"; else echo "found=false" >> "$GITHUB_OUTPUT"; fi
          echo "dl-cache tag: ${RELEASE_TAG:-<none>}"

      - name: Download + extract dl-cache
        if: steps.find_release.outputs.found == 'true'
        run: |
          set -euo pipefail
          mkdir -p /tmp/dl-cache
          gh release download "${{ steps.find_release.outputs.release_tag }}" \
            --repo "$DL_CACHE_REPO" --pattern "buildroot-dl-cache*" --dir /tmp/dl-cache || true
          if [ -z "$(ls -A /tmp/dl-cache/ 2>/dev/null || true)" ]; then
            echo "No dl-cache assets fetched; buildroot will download sources cold."; exit 0
          fi
          cd ~
          if ls /tmp/dl-cache/buildroot-dl-cache.zip.* >/dev/null 2>&1; then
            7z x /tmp/dl-cache/buildroot-dl-cache.zip.001 -y
          else
            7z x /tmp/dl-cache/buildroot-dl-cache.zip -y
          fi
          if [ -d ~/dl/dl ]; then mv ~/dl/dl/* ~/dl/ && rm -rf ~/dl/dl; fi
          echo "dl-cache files: $(find ~/dl -type f | wc -l)"

      - name: Patch buildroot (make update)
        run: |
          set -euo pipefail
          cd thingino
          # Applies thingino's patches to the buildroot tree. Must run before the
          # build — some boards fail to build without it.
          make update

      - name: Build firmware
        env:
          DEFCONFIG: ${{ steps.in.outputs.defconfig }}
        run: |
          set -euo pipefail
          cd thingino
          BOARD="$DEFCONFIG" GROUP="${GROUP:-}" make fast WORKFLOW=1

      - name: Collect image
        env:
          DEFCONFIG: ${{ steps.in.outputs.defconfig }}
          BUILD_ID: ${{ steps.in.outputs.build_id }}
        run: |
          set -euo pipefail
          FULL_FW=$(find thingino/output -type f -name "thingino-${DEFCONFIG}.bin" ! -name "*update.bin" | head -n1)
          if [ -z "$FULL_FW" ]; then
            echo "::error::No firmware image produced for ${DEFCONFIG}"
            find thingino/output -maxdepth 4 -type d 2>/dev/null || true
            exit 1
          fi
          echo "Image: $FULL_FW ($(du -h "$FULL_FW" | cut -f1))"
          mkdir -p out
          cp "$FULL_FW" "out/${BUILD_ID}.bin"
          ( cd out && sha256sum "${BUILD_ID}.bin" > "${BUILD_ID}.bin.sha256sum" )

      - name: Publish to rolling release
        env:
          BUILD_ID: ${{ steps.in.outputs.build_id }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          # A transient API error on `view` looks identical to "release missing",
          # so create is best-effort: if the tag already exists (422) that's fine.
          # The upload below is the real gate and fails if the release is absent.
          if ! gh release view "$ROLLING_TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$ROLLING_TAG" --repo "$REPO" --prerelease \
              --title "Image Builder images" \
              --notes "Rolling pre-release. Each asset is a user-requested build named <build_id>.bin." \
              || echo "::warning::release create failed (tag likely already exists), continuing"
          fi
          # Retry the upload so a finished build survives an API blip.
          for i in 1 2 3 4 5; do
            if gh release upload "$ROLLING_TAG" \
              "out/${BUILD_ID}.bin" "out/${BUILD_ID}.bin.sha256sum" --repo "$REPO" --clobber; then
              break
            fi
            if [ "$i" -eq 5 ]; then echo "::error::upload failed after 5 attempts"; exit 1; fi
            echo "upload attempt $i failed; retrying in $((i * 30))s"
            sleep "$((i * 30))"
          done
          URL="https://github.com/${REPO}/releases/download/${ROLLING_TAG}/${BUILD_ID}.bin"
          echo "Download: $URL"
          echo "- image: [\`${BUILD_ID}.bin\`](${URL})" >> "$GITHUB_STEP_SUMMARY"
